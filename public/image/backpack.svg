<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <!-- 背包主體 -->
  <rect x="30" y="70" width="140" height="130" rx="20" ry="20" fill="#5B8DD9" stroke="#3A6BBF" stroke-width="3"/>

  <!-- 背包頂部 / 提把底座 -->
  <rect x="70" y="55" width="60" height="25" rx="10" ry="10" fill="#4A7AC8" stroke="#3A6BBF" stroke-width="2"/>

  <!-- 提把 -->
  <path d="M85 55 Q100 30 115 55" fill="none" stroke="#3A6BBF" stroke-width="5" stroke-linecap="round"/>

  <!-- 主口袋拉鍊線 -->
  <line x1="50" y1="110" x2="150" y2="110" stroke="#3A6BBF" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- 前口袋 -->
  <rect x="50" y="120" width="100" height="65" rx="12" ry="12" fill="#4A7AC8" stroke="#3A6BBF" stroke-width="2"/>

  <!-- 前口袋拉鍊線 -->
  <line x1="65" y1="145" x2="135" y2="145" stroke="#3A6BBF" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- 拉鍊頭 (主口袋) -->
  <circle cx="150" cy="110" r="5" fill="#FFD700" stroke="#E5B800" stroke-width="1.5"/>

  <!-- 拉鍊頭 (前口袋) -->
  <circle cx="135" cy="145" r="4" fill="#FFD700" stroke="#E5B800" stroke-width="1.5"/>

  <!-- 左側帶扣 -->
  <rect x="22" y="100" width="12" height="18" rx="3" ry="3" fill="#FFD700" stroke="#E5B800" stroke-width="1.5"/>

  <!-- 右側帶扣 -->
  <rect x="166" y="100" width="12" height="18" rx="3" ry="3" fill="#FFD700" stroke="#E5B800" stroke-width="1.5"/>

  <!-- 左肩帶 -->
  <path d="M45 90 Q15 130 20 190" fill="none" stroke="#3A6BBF" stroke-width="8" stroke-linecap="round"/>

  <!-- 右肩帶 -->
  <path d="M155 90 Q185 130 180 190" fill="none" stroke="#3A6BBF" stroke-width="8" stroke-linecap="round"/>

  <!-- 裝飾縫線 (主體) -->
  <rect x="38" y="78" width="124" height="114" rx="16" ry="16" fill="none" stroke="#7AAAE8" stroke-width="1" stroke-dasharray="6,4"/>
</svg>
