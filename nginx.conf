server {
    listen 80;
    server_name localhost;
    
    root /usr/share/nginx/html;
    index index.html;

    # --- Gzip 壓縮設定 ---
    gzip on;
    gzip_min_length 1000;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # --- 支援 /taskiu/ 子路徑 (必須放在最前面) ---
    location /taskiu/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
    
        # 靜態資源快取（在 location 內部設置）
        location ~ \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # --- 根路徑重定向 ---
    location = / {
        return 301 /taskiu/;
    }

    # --- 版本資訊 ---
    location = /taskiu/version.json {
        alias /usr/share/nginx/html/version.json;
        add_header Content-Type application/json;
        access_log off;
    }

    # 錯誤頁面
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
server {
    listen 80;
    server_name localhost;

    # 安全頭部
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # 修復 COOP 問題 - 允許彈出窗口通信
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # Frontend
    location /taskiu/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /taskiu/index.html;
        
        # CORS 配置
        add_header Access-Control-Allow-Origin "https://tavinki.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        add_header Access-Control-Allow-Credentials "true" always;
    }

    # 健康檢查
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
